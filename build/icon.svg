<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1425"/>
      <stop offset="100%" style="stop-color:#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#06b6d4" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Corner accents -->
  <g fill="#06b6d4" opacity="0.12">
    <rect x="48" y="48" width="32" height="3" rx="1.5"/>
    <rect x="48" y="48" width="3" height="32" rx="1.5"/>
    <rect x="432" y="48" width="32" height="3" rx="1.5"/>
    <rect x="461" y="48" width="3" height="32" rx="1.5"/>
    <rect x="48" y="461" width="32" height="3" rx="1.5"/>
    <rect x="48" y="432" width="3" height="32" rx="1.5"/>
    <rect x="432" y="461" width="32" height="3" rx="1.5"/>
    <rect x="461" y="432" width="3" height="32" rx="1.5"/>
  </g>

  <!-- MA Letters - Bold filled style -->
  <g filter="shadow">
    <!-- M letter - filled, bold -->
    <path d="M 68 370 L 68 152 C 68 148 71 145 75 145 L 100 145 C 104 145 107 147 109 150 L 188 268 L 267 150 C 269 147 272 145 276 145 L 301 145 C 305 145 308 148 308 152 L 308 370 C 308 374 305 377 301 377 L 276 377 C 272 377 269 374 269 370 L 269 230 L 198 336 C 195 340 189 340 186 336 L 107 230 L 107 370 C 107 374 104 377 100 377 L 75 377 C 71 377 68 374 68 370 Z"
          fill="url(#glow)"/>

    <!-- A letter - filled, bold -->
    <path d="M 348 370 C 346 374 343 377 339 377 L 312 377 C 307 377 304 373 305 368 L 382 152 C 383 148 387 145 391 145 L 418 145 C 422 145 426 148 427 152 L 504 368 C 505 373 502 377 497 377 L 470 377 C 466 377 463 374 461 370 L 449 340 L 360 340 Z M 373 305 L 436 305 L 405 210 Z"
          fill="url(#glow)"/>
  </g>

  <!-- Accent dot between M and A -->
  <circle cx="328" cy="370" r="6" fill="#22d3ee" opacity="0.6"/>

  <!-- Top accent line -->
  <rect x="180" y="108" width="152" height="3" rx="1.5" fill="#06b6d4" opacity="0.25"/>
  <rect x="180" y="401" width="152" height="3" rx="1.5" fill="#06b6d4" opacity="0.25"/>
</svg>
