<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Outer border glow -->
  <rect x="20" y="20" width="984" height="984" rx="200" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <!-- Document/ledger icon base -->
  <rect x="280" y="180" width="464" height="580" rx="40" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <!-- Header bar -->
  <rect x="280" y="180" width="464" height="90" rx="40" fill="url(#accent)" opacity="0.9"/>
  <rect x="280" y="230" width="464" height="40" fill="url(#accent)" opacity="0.9"/>
  <!-- MA text in header -->
  <text x="400" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#0f172a" letter-spacing="-1">MA</text>
  <!-- Ledger lines -->
  <line x1="320" y1="340" x2="704" y2="340" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="410" x2="704" y2="410" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="480" x2="704" y2="480" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="550" x2="704" y2="550" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="620" x2="704" y2="620" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="690" x2="704" y2="690" stroke="#334155" stroke-width="2"/>
  <!-- Vertical divider for ledger columns -->
  <line x1="520" y1="290" x2="520" y2="730" stroke="#334155" stroke-width="2"/>
  <!-- Row data (left column - text bars) -->
  <rect x="340" y="310" width="140" height="14" rx="4" fill="#64748b" opacity="0.6"/>
  <rect x="340" y="380" width="120" height="14" rx="4" fill="#64748b" opacity="0.6"/>
  <rect x="340" y="450" width="150" height="14" rx="4" fill="#64748b" opacity="0.6"/>
  <rect x="340" y="520" width="110" height="14" rx="4" fill="#64748b" opacity="0.6"/>
  <rect x="340" y="590" width="140" height="14" rx="4" fill="#64748b" opacity="0.6"/>
  <rect x="340" y="660" width="100" height="14" rx="4" fill="#64748b" opacity="0.6"/>
  <!-- Row data (right column - numbers) -->
  <rect x="560" y="310" width="100" height="14" rx="4" fill="#38bdf8" opacity="0.5"/>
  <rect x="580" y="380" width="80" height="14" rx="4" fill="#38bdf8" opacity="0.5"/>
  <rect x="550" y="450" width="110" height="14" rx="4" fill="#38bdf8" opacity="0.5"/>
  <rect x="570" y="520" width="90" height="14" rx="4" fill="#f87171" opacity="0.5"/>
  <rect x="560" y="590" width="100" height="14" rx="4" fill="#38bdf8" opacity="0.5"/>
  <rect x="540" y="660" width="120" height="14" rx="4" fill="#4ade80" opacity="0.5"/>
  <!-- Checkmark badge (bottom-right) -->
  <circle cx="720" cy="720" r="80" fill="#4f46e5"/>
  <circle cx="720" cy="720" r="80" fill="url(#accent)" opacity="0.8"/>
  <path d="M680 720 L710 750 L760 690" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
