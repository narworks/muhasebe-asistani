<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Circuit traces - background pattern -->
  <g stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.15">
    <line x1="40" y1="120" x2="160" y2="120"/>
    <line x1="352" y1="120" x2="472" y2="120"/>
    <line x1="40" y1="392" x2="160" y2="392"/>
    <line x1="352" y1="392" x2="472" y2="392"/>
    <line x1="120" y1="40" x2="120" y2="160"/>
    <line x1="392" y1="40" x2="392" y2="160"/>
    <line x1="120" y1="352" x2="120" y2="472"/>
    <line x1="392" y1="352" x2="392" y2="472"/>
    <line x1="40" y1="200" x2="130" y2="256"/>
    <line x1="472" y1="200" x2="382" y2="256"/>
    <line x1="40" y1="312" x2="130" y2="256"/>
    <line x1="472" y1="312" x2="382" y2="256"/>
    <line x1="200" y1="40" x2="200" y2="130"/>
    <line x1="312" y1="40" x2="312" y2="130"/>
    <line x1="200" y1="382" x2="200" y2="472"/>
    <line x1="312" y1="382" x2="312" y2="472"/>
  </g>

  <!-- Circuit nodes (dots) - background -->
  <g fill="#06b6d4" opacity="0.25">
    <circle cx="40" cy="120" r="3"/>
    <circle cx="472" cy="120" r="3"/>
    <circle cx="40" cy="392" r="3"/>
    <circle cx="472" cy="392" r="3"/>
    <circle cx="120" cy="40" r="3"/>
    <circle cx="392" cy="40" r="3"/>
    <circle cx="120" cy="472" r="3"/>
    <circle cx="392" cy="472" r="3"/>
    <circle cx="160" cy="120" r="5"/>
    <circle cx="352" cy="120" r="5"/>
    <circle cx="160" cy="392" r="5"/>
    <circle cx="352" cy="392" r="5"/>
    <circle cx="120" cy="160" r="5"/>
    <circle cx="392" cy="160" r="5"/>
    <circle cx="120" cy="352" r="5"/>
    <circle cx="392" cy="352" r="5"/>
    <circle cx="200" cy="40" r="3"/>
    <circle cx="312" cy="40" r="3"/>
    <circle cx="200" cy="472" r="3"/>
    <circle cx="312" cy="472" r="3"/>
  </g>

  <!-- MA Letters - circuit board style with thick traces -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- M letter traces -->
    <path d="M 110 350 L 110 170 L 195 270 L 280 170 L 280 350"
          stroke="url(#circuit)" stroke-width="28"/>

    <!-- A letter traces -->
    <path d="M 300 350 L 365 170 L 430 350 M 320 285 L 410 285"
          stroke="url(#circuit)" stroke-width="28"/>
  </g>

  <!-- Circuit nodes on letters -->
  <g>
    <!-- M nodes -->
    <circle cx="110" cy="170" r="10" fill="#06b6d4"/>
    <circle cx="110" cy="350" r="10" fill="#06b6d4"/>
    <circle cx="195" cy="270" r="12" fill="#22d3ee"/>
    <circle cx="280" cy="170" r="10" fill="#06b6d4"/>
    <circle cx="280" cy="350" r="10" fill="#06b6d4"/>
    <!-- A nodes -->
    <circle cx="300" cy="350" r="10" fill="#06b6d4"/>
    <circle cx="365" cy="170" r="12" fill="#22d3ee"/>
    <circle cx="430" cy="350" r="10" fill="#06b6d4"/>
    <circle cx="320" cy="285" r="10" fill="#06b6d4"/>
    <circle cx="410" cy="285" r="10" fill="#06b6d4"/>
  </g>

  <!-- Glow effects on key nodes -->
  <g opacity="0.3">
    <circle cx="195" cy="270" r="24" fill="#22d3ee"/>
    <circle cx="365" cy="170" r="24" fill="#22d3ee"/>
  </g>

  <!-- Connecting traces from letters to edge circuit -->
  <g stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.2">
    <line x1="110" y1="170" x2="120" y2="160"/>
    <line x1="280" y1="170" x2="312" y2="130"/>
    <line x1="110" y1="350" x2="120" y2="352"/>
    <line x1="430" cy="350" x2="392" y2="352"/>
    <line x1="365" y1="170" x2="392" y2="160"/>
  </g>
</svg>
