name: Build and Release

on:
  push:
    tags:
      - 'v*'

# Required GitHub Secrets:
# - GEMINI_API_KEY: Google Gemini AI API key
# - SUPABASE_URL: Supabase project URL
# - SUPABASE_ANON_KEY: Supabase anonymous/public key
# - SUPABASE_SERVICE_ROLE_KEY: Supabase service role key
# - BILLING_URL: Billing portal URL
#
# macOS Code Signing & Notarization:
# - CSC_LINK: Base64 encoded .p12 certificate (Developer ID Application)
# - CSC_KEY_PASSWORD: Password for the .p12 certificate
# - APPLE_ID: Apple ID email for notarization
# - APPLE_APP_SPECIFIC_PASSWORD: App-specific password (appleid.apple.com)
# - APPLE_TEAM_ID: Apple Developer Team ID

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env file
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BILLING_URL: ${{ secrets.BILLING_URL }}
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "SUPABASE_URL=${SUPABASE_URL}" >> .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" >> .env
          echo "BILLING_URL=${BILLING_URL}" >> .env

      - name: Verify .env file
        shell: bash
        run: |
          echo "Checking .env file..."
          if [ -f .env ]; then
            echo ".env file exists"
            echo "Number of lines: $(wc -l < .env)"
            echo "Variables defined: $(grep -c '=' .env || echo 0)"
          else
            echo "ERROR: .env file not created!"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run tests
        run: npm run test

      - name: Build Vite app
        run: npm run build

      - name: Fix asset paths
        run: node scripts/fix-paths.js

      - name: Generate env-config.js
        run: node scripts/build-env.js

      - name: Build Electron app (macOS universal)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --arm64 --x64 --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f || echo "No artifacts found"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
