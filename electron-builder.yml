appId: com.narworks.muhasebeasistani
productName: "Muhasebe Asistanı"
icon: build/icon.png
directories:
  output: release
  buildResources: build
files:
  - "dist/**/*"
  - "main/**/*"
  - "package.json"
  - "!src/**/*"
  - "!vite.config.*"
  - "!index.html"
  # node_modules are automatically included by electron-builder (production deps only)

# Native module handling (better-sqlite3) + Puppeteer Chromium
asarUnpack:
  - "**/*.node"
  - "node_modules/puppeteer/**/*"
  - "node_modules/@puppeteer/**/*"

# Bundle Puppeteer Chromium binary as extraResources so it ships with installer
extraResources:
  - from: ".puppeteer-cache"
    to: "puppeteer-cache"
    filter:
      - "**/*"

mac:
  target:
    - dmg
    - zip
  artifactName: "Muhasebe-Asistani-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

win:
  target: nsis
  artifactName: "Muhasebe-Asistani-Setup.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  artifactName: "Muhasebe-Asistani.${ext}"
  category: Office

# Auto-update configuration
publish:
  provider: github
  owner: narworks
  repo: muhasebe-asistani
